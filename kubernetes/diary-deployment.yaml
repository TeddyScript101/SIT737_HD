apiVersion: apps/v1
kind: Deployment
metadata:
  name: diary-service
  namespace: diary-app
  labels:
    app: diary-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: diary-service
  template:
    metadata:
      labels:
        app: diary-service
    spec:
      containers:
        - name: diary-service
          image: teddyhiny/diary-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/diary-entries"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: diary-secrets
                  key: jwt-secret
            - name: GCS_BUCKET_NAME
              value: "diary-app-uploads-sit737"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/gcs/key.json"
          volumeMounts:
            - name: gcs-key
              mountPath: /secrets/gcs
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: gcs-key
          secret:
            secretName: gcs-sa-key
---
apiVersion: v1
kind: Service
metadata:
  name: diary-service
  namespace: diary-app
spec:
  selector:
    app: diary-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
