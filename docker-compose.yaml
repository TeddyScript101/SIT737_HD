version: '3.9'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/diary-auth
      JWT_SECRET: local-dev-secret-change-for-production
    depends_on:
      mongodb:
        condition: service_healthy

  diary-service:
    build: ./diary-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/diary-entries
      JWT_SECRET: local-dev-secret-change-for-production
      UPLOADS_DIR: /uploads
    volumes:
      - uploads-data:/uploads
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - diary-service

volumes:
  mongo-data:
  uploads-data:
